<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya-L1 • Data Vision Visualizer</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/nova.css">
    <style>
        .visualizer-main {
            padding-top: 130px;
            background: url('assets/visualizer_bg.png') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        .visualizer-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(3,2,10,0.4) 0%, rgba(3,2,10,0.95) 100%);
            z-index: 1; pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Navigation HUD -->
    <nav class="nova-nav">
        <div class="nav-brand-group">
            <a href="index.html" class="nav-brand" style="color: var(--accent-plasma); text-decoration: none; font-family: var(--font-display); font-weight: 700;">ADITYA-L1</a>
            <div id="mission-timer">MET: ---D --:--:--</div>
        </div>
        
        <div class="mini-hud-strip">
            <div class="hud-metric">
                <span class="hud-metric-label">Density</span>
                <span class="hud-metric-value" id="hud-density">--.-<span>cm⁻³</span></span>
            </div>
            <div class="hud-metric">
                <span class="hud-metric-label">Velocity</span>
                <span class="hud-metric-value" id="hud-speed">---<span>km/s</span></span>
            </div>
            <div class="hud-metric">
                <span class="hud-metric-label">B-Field</span>
                <span class="hud-metric-value" id="hud-mag">--.-<span>nT</span></span>
            </div>
        </div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">SCIENCE</a>
            <a href="dashboard.html" class="nav-link">DASHBOARD</a>
            <a href="visualizer.html" class="nav-link active">VISUALIZER</a>
            <a href="explorer.html" class="nav-link">EXPLORER</a>
            <a href="lab.html" class="nav-link">LAB</a>
        </div>
    </nav>

    <div class="visualizer-overlay"></div>

    <main class="visualizer-main">
        <div class="nova-container">
            
            <header class="page-header reveal-text">
                <span class="chapter-label">[ DATA VISION • INTERACTIVE ]</span>
                <h1>PLASMA EXPLORER</h1>
                <p>High-resolution temporal analysis of solar wind populations.</p>
            </header>

            <div class="hologram-panel reveal-text" style="height: 500px; margin-bottom: 3rem;">
                <div id="chart-overview" style="height: 100%; width: 100%;"></div>
            </div>

            <footer style="margin-top: 5rem; text-align: center; color: var(--text-muted); font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.1em; padding-bottom: 50px;">
                EOF // DATA VISION SYSTEM // ADITYA-L1 MISSION SCIENCE
            </footer>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/nova.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
